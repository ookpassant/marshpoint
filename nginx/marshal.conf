server {
    listen 80;
    server_name marshpoint.co.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name marshpoint.co.uk;

    ssl_certificate     /etc/letsencrypt/live/marshpoint.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marshpoint.co.uk/privkey.pem;

    # Serve React build
    root /var/www/marshal-app/client/build;
    index index.html;

    # API reverse proxy
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 10M;        # Allow licence uploads
    }

    # React SPA — all non-API routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
