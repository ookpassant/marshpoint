name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server — tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marshals_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      TEST_DB_NAME: marshals_test
      JWT_SECRET: ci-test-secret
      EMAIL_FROM_ADDRESS: coordinator@test.local
      UPLOAD_DIR: /tmp/marshal-uploads

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install
        working-directory: server
        run: npm ci
      - name: Test (unit + integration)
        working-directory: server
        run: npm test

  client:
    name: Client — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install
        working-directory: client
        run: npm ci
      - name: Build
        working-directory: client
        env:
          CI: "true"
          GENERATE_SOURCEMAP: "false"
        run: npm run build
